# Production base. Use as-is for production: docker-compose -f docker-compose.yml up
# For development, run plain `docker-compose up` — docker-compose.override.yml is merged automatically.
services:
  cocktailmaker:
    image: cocktailmaker:${TAG:-latest}
    environment:
      - Mqtt__Host=mosquitto
    build:
      context: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    depends_on:
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
