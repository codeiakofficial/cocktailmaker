[platformio]
default_envs = esp32

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
test_ignore = *

# Dependencies
lib_deps =
    ArduinoJson
    WiFiClientSecure
    knolleary/PubSubClient

# Build flags
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

# Test environment (runs on native platform, not on device)
[env:test]
platform = native
test_framework = unity
build_flags = -I test/mocks
build_src_filter = -<main.cpp>
lib_deps =
    ArduinoJson
