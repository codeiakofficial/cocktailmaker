[env:esp32]
platform = espressif32
board = esp32devkitc
framework = arduino
monitor_speed = 115200

# Dependencies
lib_deps =
    ArduinoJson
    WiFiClientSecure

# Build flags
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

# Test environment (runs on native platform, not on device)
[env:test]
platform = native
test_framework = unity
