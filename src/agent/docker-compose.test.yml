version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/data/cocktailmaker.db
    volumes:
      - ./data:/data
    networks:
      - cocktailmaker

networks:
  cocktailmaker:
    driver: bridge
