name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  checks: write

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore ./src/backend/
      - name: Build
        run: dotnet build ./src/backend/ --no-restore
      - name: Test
        run: dotnet test ./tests/backend/ --logger trx --results-directory test-results
      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Tests
          path: test-results/*.trx
          reporter: dotnet-trx

  frontend:
    name: Frontend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install
        working-directory: src/frontend
        run: npm ci
      - name: Build
        working-directory: src/frontend
        run: npm run build
      - name: Test
        working-directory: src/frontend
        run: npm test -- --run --reporter=junit --outputFile=test-results.xml
      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Frontend Tests
          path: src/frontend/test-results.xml
          reporter: java-junit

  esp32:
    name: ESP32 — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build firmware
        working-directory: src/agent
        run: pio run -e esp32
      - name: Run unit tests
        working-directory: src/agent
        run: pio test -e test --junit-output-path test-results.xml
      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: ESP32 Tests
          path: src/agent/test-results.xml
          reporter: java-junit
