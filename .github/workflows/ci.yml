name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  checks: write

jobs:
  lint:
    name: Lint — branch, commits & review checklist
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check branch name
        run: |
          branch="${GITHUB_HEAD_REF}"
          if [[ ! "$branch" =~ ^(feature|hotfix)/.+ ]]; then
            echo "::error::Branch '$branch' must match feature/* or hotfix/*"
            exit 1
          fi
      - name: Check commit messages
        run: |
          npx --yes \
            --package=@commitlint/cli \
            --package=@commitlint/config-conventional \
            commitlint --from=${{ github.event.pull_request.base.sha }} --to=HEAD
      - name: Check roadmap cleanup
        run: |
          if grep -qF '| In Progress |' AGENTS.md; then
            echo "::error::Remove all 'In Progress' rows from the AGENTS.md roadmap before merging."
            exit 1
          fi
      - name: Check review checklist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(gh pr view ${{ github.event.pull_request.number }} --json body --jq '.body')
          if [[ "$body" != *'- [x] Review completed'* ]]; then
            echo "::error::PR body must contain a ticked '- [x] Review completed' checkbox. Add it from the PR template and tick it after running the @claude review."
            exit 1
          fi
          if [[ "$body" != *'- [x] `AGENTS.md` Last Review table updated'* ]]; then
            echo "::error::PR body must contain a ticked '- [x] \`AGENTS.md\` Last Review table updated' checkbox."
            exit 1
          fi

  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore ./src/backend/
      - name: Build
        run: dotnet build ./src/backend/ --no-restore
      - name: Test
        run: dotnet test ./tests/backend/ --logger trx --results-directory test-results
      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Backend Tests
          path: test-results/*.trx
          reporter: dotnet-trx

  frontend:
    name: Frontend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install
        working-directory: src/frontend
        run: npm ci
      - name: Build
        working-directory: src/frontend
        run: npm run build
      - name: Test
        working-directory: src/frontend
        run: npm test -- --run --reporter=default --reporter=junit --outputFile=test-results.xml
      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Frontend Tests
          path: src/frontend/test-results.xml
          reporter: java-junit

  esp32:
    name: ESP32 — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: pip install platformio
      - name: Create local config
        run: cp src/agent/src/config_local.h.example src/agent/src/config_local.h
      - name: Build firmware
        working-directory: src/agent
        run: pio run -e esp32
      - name: Run unit tests
        working-directory: src/agent
        run: pio test -e test --junit-output-path test-results.xml
      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: ESP32 Tests
          path: src/agent/test-results.xml
          reporter: java-junit

  release:
    name: Release — build & push image
    runs-on: ubuntu-latest
    needs: [backend, frontend, esp32]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'
      - name: Calculate version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: src
          push: true
          tags: |
            ghcr.io/codeiakofficial/cocktailmaker:${{ steps.gitversion.outputs.MajorMinorPatch }}
            ghcr.io/codeiakofficial/cocktailmaker:latest
      - name: Tag and create release
        run: |
          VERSION="${{ steps.gitversion.outputs.MajorMinorPatch }}"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists, skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            gh release create "v${VERSION}" --generate-notes --title "v${VERSION}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
