name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  checks: write

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore ./src/backend/
      - name: Build
        run: dotnet build ./src/backend/ --no-restore
      - name: Test
        run: dotnet test ./tests/backend/ --logger trx --results-directory test-results
      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Backend Tests
          path: test-results/*.trx
          reporter: dotnet-trx

  frontend:
    name: Frontend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install
        working-directory: src/frontend
        run: npm ci
      - name: Build
        working-directory: src/frontend
        run: npm run build
      - name: Test
        working-directory: src/frontend
        run: npm test -- --run --reporter=default --reporter=junit --outputFile=test-results.xml
      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Frontend Tests
          path: src/frontend/test-results.xml
          reporter: java-junit

  esp32:
    name: ESP32 — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: pip install platformio
      - name: Create local config
        run: cp src/agent/src/config_local.h.example src/agent/src/config_local.h
      - name: Build firmware
        working-directory: src/agent
        run: pio run -e esp32
      - name: Run unit tests
        working-directory: src/agent
        run: pio test -e test --junit-output-path test-results.xml
      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: ESP32 Tests
          path: src/agent/test-results.xml
          reporter: java-junit

  release:
    name: Release — build & push image
    runs-on: ubuntu-latest
    needs: [backend, frontend, esp32]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/codeiakofficial/cocktailmaker
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: src
          push: true
          tags: ${{ steps.meta.outputs.tags }}
